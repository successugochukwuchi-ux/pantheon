name: pantheon_flutter
description: A new Flutter project for the Pantheon Study App.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  flutter_colorpicker: ^1.1.0
  flutter_windowmanager: ^0.2.0
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
